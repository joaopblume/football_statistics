services:
  # Define the MinIO object storage service
  minio:
    # Use the latest official MinIO image
    image: minio/minio:latest
    # Assign a predictable container name
    container_name: minio
    # Run the server daemon and explicitly bind the web console to port 9001
    command: server /data --console-address ":9001"
    ports:
      # S3 API port (used by engines like Spark, Trino, and Iceberg)
      - "9000:9000"
      # Web console port (used for manual GUI administration)
      - "9001:9001"
    environment:
      # Root user (functionally equivalent to an AWS Access Key)
      MINIO_ROOT_USER: minioadmin
      # Root password (functionally equivalent to an AWS Secret Key)
      MINIO_ROOT_PASSWORD: minioadmin123
      # Set a default region to prevent errors from strict AWS S3 client libraries
      MINIO_REGION_NAME: us-east-1
    volumes:
      # Persist data locally so buckets and objects are not lost upon container restart
      - ./minio-data:/data
    networks:
      - datalake-network
    # Ensure the container automatically restarts on failure or system reboot
    restart: unless-stopped
    # Cap memory: MinIO is lightweight for this workload (small JSON files)
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # Define the MinIO Client (mc) service for automated initialization
  mc:
    # Use the official MinIO client image
    image: minio/mc:latest
    # Assign a predictable container name
    container_name: minio-mc
    depends_on:
      # Ensure the MinIO container starts before this initialization script runs
      - minio
    # Execute a shell script to robustly initialize the connection and create buckets
    entrypoint: |
      /bin/sh -c '
      # Keep attempting to set the alias until it succeeds
      until mc alias set local http://minio:9000 minioadmin minioadmin123; do
        echo "Waiting for MinIO server to initialize..."
        sleep 2
      done
      
      # Create buckets
      mc mb -p local/datalake-raw || true
      mc mb -p local/datalake-warehouse || true
      mc mb -p local/datalake-artifacts || true
      
      # Set permissions
      mc anonymous set none local/datalake-raw || true
      mc anonymous set none local/datalake-warehouse || true
      mc anonymous set none local/datalake-artifacts || true
      
      echo "MinIO buckets successfully created."
      # Keep container alive
      tail -f /dev/null
      '
    networks:
      - datalake-network
    # Match the restart policy of the main service
    restart: unless-stopped

networks:
  datalake-network:
    name: datalake-network
    driver: bridge
