# ===== Iceberg catalog (HadoopCatalog) =====
# Set the lake catalog to use the SparkCatalog implementation from Iceberg
spark.sql.catalog.lake=org.apache.iceberg.spark.SparkCatalog
# Use Hadoop type catalog for direct S3/MinIO paths
spark.sql.catalog.lake.type=hadoop
# Define the root path for Iceberg tables in the warehouse bucket
spark.sql.catalog.lake.warehouse=s3a://datalake-warehouse/iceberg

# ===== MinIO via S3A =====
# Point S3A endpoint to MinIO container
spark.hadoop.fs.s3a.endpoint=http://minio:9000
# Force S3A to use path-style access instead of virtual-hosted style
spark.hadoop.fs.s3a.path.style.access=true
# Disable SSL for local testing
spark.hadoop.fs.s3a.connection.ssl.enabled=false
# Explicitly set the S3AFileSystem implementation class
spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem

# Set simple credentials provider to avoid credential chain delays
spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# ===== Local Optimization Options =====
# Reduce shuffle partitions for local environment to improve performance
spark.sql.shuffle.partitions=8
# Enable Adaptive Query Execution
spark.sql.adaptive.enabled=true
