services:
  # Jupyter Notebook instance running PySpark (resource efficient for local development)
  pyspark:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter-spark
    ports:
      - "8888:8888" # Jupyter Notebook UI
      - "4040:4040" # Spark UI (active when SparkSession is running)
    environment:
      # Credentials for MinIO (mapped to Hadoop S3A)
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123

      # Expose Spark to all processes (including docker exec).
      # Without these, processes launched via 'docker exec' cannot find
      # pyspark because they bypass the Jupyter startup scripts.
      SPARK_HOME: /usr/local/spark
      PYTHONPATH: /usr/local/spark/python:/usr/local/spark/python/lib/py4j-0.10.9.7-src.zip
      
      # Descobrimos que a versão do Hadoop base dessa imagem (jupyter/pyspark-notebook) não possui
      # algumas classes da 3.3.6. A versão 3.3.4 (padrão do Spark 3.5 pre-built) deve funcionar.
      PYSPARK_SUBMIT_ARGS: >
        --packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
        --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
        pyspark-shell
    volumes:
      # Mount the notebooks directory to persist work
      - ./notebooks:/home/jovyan/work
      # Mount the pre-configured spark-defaults.conf
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
    networks:
      # Connect to the external network shared with MinIO
      - datalake-network
    # Do not auto-restart: Airflow manages the Spark lifecycle (start/stop)
    restart: "no"
    # Cap memory usage so the VM is not overwhelmed
    deploy:
      resources:
        limits:
          memory: 3g
        reservations:
          memory: 1.5g

networks:
  # Define the external network created by the MinIO docker-compose
  datalake-network:
    external: true
