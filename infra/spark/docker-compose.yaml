services:
  # Jupyter Notebook instance running PySpark (resource efficient for local development)
  pyspark:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter-spark
    ports:
      - "8888:8888" # Jupyter Notebook UI
      - "4040:4040" # Spark UI (active when SparkSession is running)
    environment:
      # Credentials for MinIO (mapped to Hadoop S3A)
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      
      # Download Iceberg and S3A dependencies upon Spark initialization
      # Note: This uses packages compatible with Spark 3.5.x, which is the default in the latest image
      PYSPARK_SUBMIT_ARGS: >
        --conf spark.jars.packages=org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,org.apache.hadoop:hadoop-aws:3.3.6,com.amazonaws:aws-java-sdk-bundle:1.12.262
        pyspark-shell
    volumes:
      # Mount the notebooks directory to persist work
      - ./notebooks:/home/jovyan/work
      # Mount the pre-configured spark-defaults.conf
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
    networks:
      # Connect to the external network shared with MinIO
      - datalake-network
    restart: unless-stopped

networks:
  # Define the external network created by the MinIO docker-compose
  datalake-network:
    external: true
